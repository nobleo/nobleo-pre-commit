name: Deploy Docker

on:
  workflow_dispatch:

jobs:
  deploy-docker:
    name: Deploy Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: |
          docker build . -t "nobleo/pre-commit:4"
          docker push "nobleo/pre-commit:4.6
          docker push "nobleo/pre-commit:4
