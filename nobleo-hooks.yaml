repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-xml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude_types: [binary, image]
      - id: trailing-whitespace
        exclude_types: [binary, image]
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.1
    hooks:
    - id: clang-format
      args:
        - -i
        - | # Identical to: https://github.com/ament/ament_lint/blob/HEAD/ament_clang_format/ament_clang_format/configuration/.clang-format
          --style={
            BasedOnStyle: Google,
            AccessModifierOffset: -2,
            AlignAfterOpenBracket: AlwaysBreak,
            BraceWrapping: {
              AfterClass: true,
              AfterFunction: true,
              AfterNamespace: true,
              AfterStruct: true,
              AfterEnum: true
            },
            BreakBeforeBraces: Custom,
            ColumnLimit: 100,
            ConstructorInitializerIndentWidth: 0,
            ContinuationIndentWidth: 2,
            DerivePointerAlignment: false,
            PointerAlignment: Middle,
            ReflowComments: false
          }
      exclude: \.ipynb$  # Until: https://github.com/pre-commit/mirrors-clang-format/pull/33
  - repo: https://github.com/tier4/pre-commit-hooks-ros
    rev: v0.10.0
    hooks:
      - id: sort-package-xml
  # Combination tool for Black-style formatting, flake8, isort etc for python files:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.6
    hooks:
      # Linter.
      - id: ruff
        args: [ --fix ]
      # Formatter.
      - id: ruff-format
        args: [ --config, "line-length = 99", --config, "format.quote-style = 'single'" ]
