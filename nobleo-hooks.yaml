repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-xml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude_types: [binary, image]
      - id: trailing-whitespace
        exclude_types: [binary, image]
  - repo: https://github.com/tier4/pre-commit-hooks-ros
    rev: v0.10.0
    hooks:
      - id: sort-package-xml
